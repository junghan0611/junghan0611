<!-- head.html — injected verbatim before </head> in index.html and record.html by the
     Makefile, AFTER pandoc. It is not passed through pandoc's --embed-resources on purpose:
     the Umami tag is an external <script src> that must stay a live reference (its own
     data-website-id is how Umami identifies the site), and inlining it would both break that
     and make the build fetch the network. So it is post-injected, stays deterministic and
     offline, and `make check` greps the shipped HTML to keep this honest.

     Everything here is site-level (analytics, identity schema, favicon) and valid on every
     page, so one file serves both the landing and the record. No per-page canonical/og:url is
     set for that reason. Serving (Caddy, TLS, the Umami server itself) is nixos-config's
     surface; this file only carries the one line the site's SSOT must own — the analytics tag,
     because Caddy deliberately injects nothing. -->
